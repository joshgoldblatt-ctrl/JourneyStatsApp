<!--
================================================================================
  App:          LaGuardia Navigate Journeys Analyzer
  Version:      2.2
  Released:     June 10, 2026
  Developed by: Josh Goldblatt using Claude
================================================================================
  CHANGELOG (most recent first)
--------------------------------------------------------------------------------
  v2.2  2026-06-10
    - PDF output now starts directly with the overview table. The app header
      (title, subtitle, version box) and the "Universal journeys detected"
      panel are hidden in print only — both remain visible on screen.
  v2.1  2026-06-10
    - Added a "Save as PDF" button next to "Download flat file". It opens the
      browser's print dialog; the user chooses "Save as PDF" as the
      destination. No new libraries/dependencies — uses the browser's built-in
      print-to-PDF so the app stays a self-contained single file.
    - Added print-specific CSS so the PDF is a clean analysis report: the drop
      zone, buttons, and the universal-journey checkboxes are hidden; the app
      header (title + version) is kept so the printout is self-identifying;
      shadows are flattened; journey blocks avoid breaking across pages.
    - Print uses landscape orientation so all 7 overview columns fit without
      clipping (portrait was cutting off the right-most step columns).
    - Both buttons now sit in a shared "action bar" that appears together once
      a file is loaded.
  v2.0  2026-06-10
    - Added a new metric: "Students with 3+ steps complete" — the count of
      unique students who completed 3 or more DISTINCT steps within a journey
      (completer-agnostic; any completed step counts regardless of who marked
      it). Shown as count + % of assigned.
    - Appears in both the overview table (new column, placed between "at least
      1 step complete" and "journey complete") and the per-journey detail
      cards (new 4th metric card in the same position).
    - In the deduplicated grand total, this column counts unique students who
      hit 3+ steps within a SINGLE journey in at least one journey — a student
      with 2 steps in one journey and 2 in another does not qualify. This is
      computed per (student, journey), then deduplicated by student.
    - Journeys with fewer than 3 steps would always show 0 here, which is
      accurate (left as 0 by design).
  v1.9  2026-06-10
    - Overview table now detects "universal" journeys — ones assigned to
      essentially the same students as one another (e.g. Transfer & Career
      Part I and II). Detection compares each journey's student-ID set against
      every other journey's using Jaccard overlap; journeys with >= 0.85
      overlap with at least one other are flagged as candidates.
    - When universal journeys are detected, a confirmation panel appears above
      the overview with the candidates pre-checked. The user can check/uncheck
      to control the split; the overview re-renders instantly on change.
    - When one or more journeys are treated as universal, the overview splits
      into a "Major / Program Journeys" group (with subtotal) and a "Universal
      Journeys" group (with subtotal), followed by a "Grand total — unique
      students" row. The grand total deduplicates by Student ID across the
      whole file, so students assigned to multiple journeys are no longer
      double/triple-counted (this fixes the inflated Assigned total).
    - If no overlap is detected (all-distinct journeys, whether all-major,
      all-universal-but-unmatched, or a single journey), the overview shows the
      original flat table with one totals row — no panel, no grouping labels.
    - If every journey is confirmed universal, the Major section is omitted and
      only the Universal section + grand total are shown.
    - Note on columns: subtotals are row sums. In the grand total, the two
      student-count columns are unique-student counts (students who did X in
      ANY journey); the two step-count columns remain raw completed-step
      events (correctly summed, not deduplicated).
  v1.8  2026-05-05
    - Widened the main page container from 860px to 1100px so the six-column
      overview table fits without horizontal scrolling on typical laptop
      screens. The "Steps completed by staff" column was getting clipped at
      the old width. Horizontal-scroll fallback on the overview table stays
      in place as a safety net for narrow windows.
  v1.7  2026-05-05
    - Added a Total row at the bottom of the overview table. Each numeric
      column sums down the rows; the two student-count columns also show a
      recomputed percentage against the total assigned. Total row is styled
      with a tinted background and bold text to set it apart.
    - Note: totals are sums across journeys, not unique-student counts. A
      student assigned to two journeys is counted twice in the Assigned
      total. This matches what users expect from a column total but is
      worth knowing if the totals are ever interpreted as headcount.
  v1.6  2026-05-05
    - Renamed two metric labels for clarity, applied in both the overview
      table and the per-journey cards: "At least 1 step complete" → "Students
      with at least 1 step complete"; "Journey complete" → "Students with
      journey complete." Both columns count unique students (deduped), and
      the new labels make that explicit so they don't get confused with the
      raw step-event counts in the same view.
  v1.5  2026-05-05
    - Added a multi-journey overview table that appears at the top of results
      when the uploaded file contains more than one journey. One row per
      journey, columns: Assigned / At least 1 step complete (count + %) /
      Journey complete (count + %) / Steps completed by student / Steps
      completed by staff. Single-journey files skip the overview since the
      per-journey card below already shows everything.
    - Renamed the visible H1 from "Navigate Journeys Analyzer" to "Navigate
      Journeys Analyzer App" for consistency with other LaGuardia apps.
    - Removed the "App:" line from the in-app header block (the metadata
      comment block at the top of the file still has it). Header now shows
      Version / Released / Developed by only.
  v1.0  2026-04-22
    - Initial release under app-development conventions.
    - Upload a Navigate Journeys report CSV via drag-and-drop or file picker.
    - Displays per-journey stats (step counts, student counts, etc.).
    - Flattens the Journeys report and offers it as a CSV download.
    - Client-side only — CSV parsing handled in the browser via PapaParse; no
      data leaves the user's machine.
================================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaGuardia Navigate Journeys Analyzer v2.2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --blue: #378ADD;
    --blue-dark: #185FA5;
    --blue-light: #E6F1FB;
    --blue-mid: #85B7EB;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --teal-mid: #5DCAA5;
    --gray-bg: #F7F6F2;
    --gray-border: rgba(0,0,0,0.1);
    --gray-text: #888780;
    --text: #1a1a1a;
    --text-secondary: #5F5E5A;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #F4F2EC;
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page-wrap {
    max-width: 1100px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2.5rem;
    border-bottom: 1px solid var(--gray-border);
    padding-bottom: 1.5rem;
  }

  header h1 {
    font-size: 1.75rem;
    font-weight: normal;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header p {
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-top: 0.35rem;
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
  }

  .app-info {
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    background: var(--gray-bg);
    border-left: 3px solid var(--blue-mid);
    border-radius: var(--radius-sm);
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 0.78rem;
    color: var(--text-secondary);
    line-height: 1.55;
  }

  .app-info span {
    color: var(--text);
  }

  #drop-zone {
    background: white;
    border: 1.5px dashed #C0BDB4;
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 2rem;
  }

  #drop-zone:hover, #drop-zone.hover {
    border-color: var(--blue);
    background: var(--blue-light);
  }

  #drop-zone input { display: none; }

  .upload-arrow {
    width: 36px; height: 36px;
    background: var(--blue-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px;
    font-size: 18px;
    color: var(--blue-dark);
  }

  .upload-label {
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 14px;
    color: var(--text-secondary);
  }

  .upload-label span {
    color: var(--blue-dark);
    text-decoration: underline;
    cursor: pointer;
  }

  #file-name {
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 12px;
    color: #B4B2A9;
    margin-top: 8px;
  }

  #results { display: none; }

  .journey-block {
    background: white;
    border-radius: var(--radius);
    border: 1px solid var(--gray-border);
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .journey-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--gray-border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .journey-accent {
    width: 4px;
    height: 28px;
    background: var(--blue);
    border-radius: 2px;
    flex-shrink: 0;
  }

  .journey-title {
    font-size: 1rem;
    font-weight: normal;
    letter-spacing: -0.01em;
  }

  .metric-row {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--gray-border);
  }

  .metric-card {
    flex: 1;
    padding: 1rem 1.25rem;
    border-right: 1px solid var(--gray-border);
  }

  .metric-card:last-child { border-right: none; }

  .metric-label {
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .metric-value {
    font-size: 1.6rem;
    font-weight: normal;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .metric-pct {
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 3px;
  }

  .metric-value.complete { color: var(--teal); }
  .metric-pct.complete { color: var(--teal); }

  .overview-block {
    background: white;
    border: 1px solid var(--gray-border);
    border-radius: var(--radius);
    padding: 1.25rem 1.25rem 1.5rem;
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .overview-title {
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
    margin-bottom: 0.85rem;
  }

  .overview-scroll {
    overflow-x: auto;
  }

  table.overview {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 13px;
  }

  table.overview th {
    text-align: left;
    font-weight: 500;
    font-size: 11px;
    color: var(--text-secondary);
    padding: 8px 10px;
    border-bottom: 1px solid var(--gray-border);
    background: #FAFAF7;
    white-space: nowrap;
  }

  table.overview th.num { text-align: right; }

  table.overview td {
    padding: 10px;
    border-bottom: 1px solid var(--gray-border);
    vertical-align: middle;
  }

  table.overview tr:last-child td { border-bottom: none; }

  table.overview tr.total-row td {
    background: #FAFAF7;
    font-weight: 600;
    border-top: 1.5px solid var(--gray-border);
    border-bottom: none;
  }

  table.overview td.num {
    text-align: right;
    white-space: nowrap;
  }

  .ov-journey {
    color: var(--text);
    font-weight: 500;
  }

  .ov-count {
    color: var(--text);
  }

  .ov-pct {
    color: var(--text-secondary);
    font-size: 12px;
    margin-left: 4px;
  }

  .ov-count.complete { color: var(--teal); }
  .ov-count.student { color: var(--teal); }
  .ov-count.staff { color: var(--blue-dark); }

  /* Section header row inside the overview table (Major / Universal groups) */
  table.overview tr.section-row td {
    background: #EFF4FA;
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--blue-dark);
    padding: 7px 10px;
    border-bottom: 1px solid var(--gray-border);
  }

  /* Subtotal row for a group (lighter than the grand total) */
  table.overview tr.subtotal-row td {
    background: #FBFAF7;
    font-weight: 600;
    font-style: italic;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--gray-border);
  }
  table.overview tr.subtotal-row td .ov-count { color: var(--text-secondary); }

  /* Grand total row — unique students, deduplicated */
  table.overview tr.grand-total-row td {
    background: #F0EFEA;
    font-weight: 700;
    border-top: 2px solid var(--blue-dark);
    border-bottom: none;
  }

  .grand-total-note {
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-top: 0.75rem;
    padding-left: 2px;
  }

  /* Universal-journey confirmation panel */
  .universal-panel {
    background: var(--gray-bg);
    border: 1px solid var(--gray-border);
    border-left: 3px solid var(--blue-mid);
    border-radius: var(--radius-sm);
    padding: 1rem 1.15rem;
    margin-bottom: 1.5rem;
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
  }

  .universal-panel-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--blue-dark);
    margin-bottom: 0.4rem;
  }

  .universal-panel-desc {
    font-size: 12.5px;
    color: var(--text-secondary);
    line-height: 1.55;
    margin-bottom: 0.85rem;
  }

  .universal-options {
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
    margin-bottom: 0.4rem;
  }

  .universal-option {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
  }

  .universal-option input {
    width: 15px;
    height: 15px;
    accent-color: var(--blue-dark);
    cursor: pointer;
  }

  .universal-option .opt-meta {
    color: var(--text-secondary);
    font-size: 12px;
  }

  .scorecard {
    display: flex;
    gap: 0;
    padding: 0.9rem 1.25rem;
    border-bottom: 1px solid var(--gray-border);
    background: #FAFAF7;
    align-items: center;
    flex-wrap: wrap;
    gap: 1.25rem;
  }
  .scorecard-label {
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
    margin-right: 0.5rem;
    flex-shrink: 0;
  }
  .scorecard-items { display: flex; gap: 1.25rem; flex-wrap: wrap; }
  .scorecard-item { display: flex; align-items: baseline; gap: 6px; }
  .scorecard-num {
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }
  .scorecard-num.student { color: var(--teal); }
  .scorecard-num.staff { color: var(--blue-dark); }
  .scorecard-desc {
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .scorecard-divider {
    width: 1px; height: 18px;
    background: var(--gray-border);
    flex-shrink: 0;
  }

  .steps-section { padding: 1.25rem; }

  .steps-label {
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
    margin-bottom: 0.75rem;
  }

  table.steps {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 13px;
  }

  table.steps th {
    text-align: left;
    font-weight: 500;
    font-size: 11px;
    color: var(--text-secondary);
    padding: 6px 10px;
    border-bottom: 1px solid var(--gray-border);
    background: #FAFAF7;
  }

  table.steps th.num { text-align: right; }

  table.steps td {
    padding: 9px 10px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    vertical-align: top;
  }

  table.steps tr:last-child td { border-bottom: none; }

  table.steps td.num {
    text-align: right;
    white-space: nowrap;
  }

  .step-name {
    font-weight: 500;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 5px;
  }

  .status-pills { display: flex; flex-wrap: wrap; gap: 4px; }

  .pill {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    border: 0.5px solid var(--gray-border);
    background: var(--gray-bg);
    color: var(--text-secondary);
    white-space: nowrap;
  }

  .pill.complete {
    background: var(--teal-light);
    color: var(--teal);
    border-color: var(--teal-mid);
  }

  .pill.in-progress {
    background: var(--blue-light);
    color: var(--blue-dark);
    border-color: var(--blue-mid);
  }

  .self-val {
    font-size: 14px;
    font-weight: 500;
    color: var(--teal);
  }

  .self-pct {
    font-size: 11px;
    color: var(--teal);
    margin-top: 2px;
  }

  .self-zero { color: #C0BDB4; font-size: 13px; }

  .action-bar {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  #download-btn, #pdf-btn {
    padding: 10px 22px;
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 14px;
    font-weight: 500;
    border-radius: var(--radius-sm);
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  #download-btn {
    background: var(--blue);
    color: white;
    border: none;
  }
  #download-btn:hover { background: var(--blue-dark); }

  #pdf-btn {
    background: white;
    color: var(--blue-dark);
    border: 1px solid var(--blue-mid);
  }
  #pdf-btn:hover {
    background: var(--blue-dark);
    border-color: var(--blue-dark);
    color: white;
  }

  .error-msg {
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 13px;
    color: #A32D2D;
    background: #FCEBEB;
    border: 0.5px solid #F09595;
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 1rem;
    display: none;
  }
  /* ---- Print / Save-as-PDF styles ---- */
  @media print {
    @page {
      size: landscape;
      margin: 0.5in;
    }
    body {
      background: white !important;
      font-size: 11px;
    }
    .page-wrap {
      max-width: 100% !important;
    }
    /* Hide interactive chrome that has no meaning on paper */
    #drop-zone,
    .action-bar,
    #file-name,
    .error-msg,
    header,
    .universal-panel {
      display: none !important;
    }
    /* Flatten shadows/heavy fills to save ink and avoid render glitches */
    .journey-block,
    .overview-block {
      box-shadow: none !important;
      border: 1px solid #ccc !important;
    }
    /* Keep each journey block intact on one page where possible */
    .journey-block {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    /* The overview can break across pages if it's long, but keep rows intact */
    table.overview tr,
    table.steps tr {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    /* Tables render full width without horizontal scroll on paper */
    .overview-scroll {
      overflow-x: visible !important;
    }
    table.overview {
      width: 100% !important;
      table-layout: auto;
    }
    /* Tighten the overview so all 7 columns fit landscape width comfortably */
    table.overview th,
    table.overview td {
      padding: 5px 7px;
      font-size: 10px;
    }
  }
</style>
</head>
<body>
<div class="page-wrap">

  <header>
    <h1>Navigate Journeys Analyzer App</h1>
    <p>Upload a Journeys report CSV to view stats and download a flattened file.</p>
    <div class="app-info">
      <span>Version:</span> 2.2<br>
      <span>Released:</span> June 10, 2026<br>
      <span>Developed by:</span> Josh Goldblatt using Claude
    </div>
  </header>

  <div id="drop-zone"
    onclick="document.getElementById('file-input').click()"
    ondragover="handleDragOver(event)"
    ondragleave="handleDragLeave(event)"
    ondrop="handleDrop(event)">
    <div class="upload-arrow">&#8681;</div>
    <div class="upload-label">Drop your CSV here, or <span>browse</span></div>
    <div id="file-name">No file selected</div>
    <input type="file" id="file-input" accept=".csv" onchange="handleFile(this.files[0])">
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div id="results">
    <div class="action-bar" id="action-bar" style="display:none;">
      <button id="download-btn" onclick="downloadFlat()">&#8595; Download flat file</button>
      <button id="pdf-btn" onclick="printReport()">&#128424; Save as PDF</button>
    </div>
    <div id="stats-container"></div>
  </div>

</div>

<script>
  let parsedData = [];

  function handleDragOver(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.add('hover');
  }
  function handleDragLeave() {
    document.getElementById('drop-zone').classList.remove('hover');
  }
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('hover');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  }

  function handleFile(file) {
    if (!file) return;
    if (!file.name.endsWith('.csv')) {
      showError('Please upload a .csv file.');
      return;
    }
    document.getElementById('file-name').textContent = file.name;
    document.getElementById('error-msg').style.display = 'none';
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        if (!results.data.length) { showError('The file appears to be empty.'); return; }
        if (!results.data[0]['Journey Name']) { showError('This doesn\'t look like a Journeys report — "Journey Name" column not found.'); return; }
        parsedData = results.data;
        renderStats(parsedData);
      },
      error: function() { showError('Could not parse the file. Please check it\'s a valid CSV.'); }
    });
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function pct(num, denom) {
    if (!denom) return '0%';
    if (num === 0) return '0%';
    const val = (num / denom) * 100;
    const rounded = Math.round(val);
    if (rounded === 0) return val.toFixed(1) + '%';
    return rounded + '%';
  }

  function renderStats(data) {
    const journeys = [...new Set(data.map(r => r['Journey Name']))].filter(Boolean).sort();
    const container = document.getElementById('stats-container');
    container.innerHTML = '';

    const overviewRows = [];

    journeys.forEach(journey => {
      const rows = data.filter(r => r['Journey Name'] === journey);

      // Dedupe to one row per student for top-level metrics
      const studentMap = {};
      rows.forEach(r => {
        const id = r['Student ID'];
        if (id && !studentMap[id]) studentMap[id] = r;
      });
      const uniqueStudents = Object.values(studentMap);
      const assigned = uniqueStudents.length;
      const complete = uniqueStudents.filter(r =>
        (r['Journey Status'] || '').trim().toLowerCase() === 'complete'
      ).length;

      const steps = [...new Set(rows.map(r => r['Journey Step Name']))].filter(Boolean);

      // Count students who completed at least 1 step
      const studentsWithAnyComplete = new Set();
      rows.forEach(r => {
        if ((r['Journey Step Status'] || '').trim().toLowerCase() === 'complete') {
          studentsWithAnyComplete.add(r['Student ID']);
        }
      });
      const anyStepComplete = studentsWithAnyComplete.size;

      // Count students who completed 3 or more DISTINCT steps within this journey
      // (completer-agnostic — any completed step counts, regardless of who marked it).
      const completedStepsByStudent = {};
      rows.forEach(r => {
        if ((r['Journey Step Status'] || '').trim().toLowerCase() === 'complete') {
          const id = r['Student ID'];
          const stepName = r['Journey Step Name'];
          if (!id || !stepName) return;
          if (!completedStepsByStudent[id]) completedStepsByStudent[id] = new Set();
          completedStepsByStudent[id].add(stepName);
        }
      });
      const threePlusSteps = Object.values(completedStepsByStudent)
        .filter(set => set.size >= 3).length;

      // Journey-level step completion scorecard
      let totalStepsCompleted = 0;
      let totalStepsByStudent = 0;
      let totalStepsByStaff = 0;
      rows.forEach(r => {
        const status = (r['Journey Step Status'] || '').trim().toLowerCase();
        if (status === 'complete') {
          totalStepsCompleted++;
          const completedBy = (r['Journey Step Status Completed By Name'] || '').trim().toLowerCase();
          const studentName = (r['Student Name'] || '').trim().toLowerCase();
          if (completedBy && studentName && completedBy === studentName) {
            totalStepsByStudent++;
          } else if (completedBy) {
            totalStepsByStaff++;
          }
        }
      });

      let stepsHTML = '';
      steps.forEach(step => {
        const stepRows = rows.filter(r => r['Journey Step Name'] === step);
        const total = stepRows.length;
        const statusCounts = {};
        let selfComplete = 0;
        let totalComplete = 0;

        stepRows.forEach(r => {
          const status = (r['Journey Step Status'] || 'Unknown').trim();
          statusCounts[status] = (statusCounts[status] || 0) + 1;
          if (status.toLowerCase() === 'complete') {
            totalComplete++;
            const completedBy = (r['Journey Step Status Completed By Name'] || '').trim().toLowerCase();
            const studentName = (r['Student Name'] || '').trim().toLowerCase();
            if (completedBy && studentName && completedBy === studentName) selfComplete++;
          }
        });

        const pillsHTML = Object.entries(statusCounts).map(([s, c]) => {
          const lc = s.toLowerCase();
          const cls = lc === 'complete' ? 'complete' : lc.includes('progress') ? 'in-progress' : '';
          return `<span class="pill ${cls}">${s}: ${c} (${pct(c, total)})</span>`;
        }).join('');

        const selfHTML = selfComplete > 0
          ? `<div class="self-val">${selfComplete}</div><div class="self-pct">${pct(selfComplete, totalComplete)} of completed</div>`
          : `<span class="self-zero">—</span>`;

        stepsHTML += `
          <tr>
            <td>
              <div class="step-name">${step}</div>
              <div class="status-pills">${pillsHTML}</div>
            </td>
            <td class="num">${selfHTML}</td>
          </tr>`;
      });

      const block = document.createElement('div');
      block.className = 'journey-block';
      block.innerHTML = `
        <div class="journey-header">
          <div class="journey-accent"></div>
          <div class="journey-title">${journey}</div>
        </div>
        <div class="metric-row">
          <div class="metric-card">
            <div class="metric-label">Assigned</div>
            <div class="metric-value">${assigned}</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Students with at least 1 step complete</div>
            <div class="metric-value">${anyStepComplete}</div>
            <div class="metric-pct">${pct(anyStepComplete, assigned)} of assigned</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Students with 3+ steps complete</div>
            <div class="metric-value">${threePlusSteps}</div>
            <div class="metric-pct">${pct(threePlusSteps, assigned)} of assigned</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Students with journey complete</div>
            <div class="metric-value complete">${complete}</div>
            <div class="metric-pct complete">${pct(complete, assigned)} of assigned</div>
          </div>
        </div>
        <div class="scorecard">
          <span class="scorecard-label">Steps completed</span>
          <div class="scorecard-items">
            <div class="scorecard-item">
              <span class="scorecard-num">${totalStepsCompleted}</span>
              <span class="scorecard-desc">total</span>
            </div>
            <div class="scorecard-divider"></div>
            <div class="scorecard-item">
              <span class="scorecard-num student">${totalStepsByStudent}</span>
              <span class="scorecard-desc">by student (${pct(totalStepsByStudent, totalStepsCompleted)})</span>
            </div>
            <div class="scorecard-divider"></div>
            <div class="scorecard-item">
              <span class="scorecard-num staff">${totalStepsByStaff}</span>
              <span class="scorecard-desc">by staff (${pct(totalStepsByStaff, totalStepsCompleted)})</span>
            </div>
          </div>
        </div>
        <div class="steps-section">
          <div class="steps-label">Journey steps</div>
          <table class="steps">
            <thead>
              <tr>
                <th>Step name &amp; status breakdown</th>
                <th class="num">Completed by student</th>
              </tr>
            </thead>
            <tbody>${stepsHTML}</tbody>
          </table>
        </div>`;

      overviewRows.push({
        journey: journey,
        assigned: assigned,
        anyStepComplete: anyStepComplete,
        threePlusSteps: threePlusSteps,
        journeyComplete: complete,
        stepsByStudent: totalStepsByStudent,
        stepsByStaff: totalStepsByStaff,
        studentIds: new Set(Object.keys(studentMap))
      });

      container.appendChild(block);
    });

    // Stash for the overview renderer (re-runs when the user toggles universal journeys)
    window._overviewRows = overviewRows;
    window._overviewData = data;

    if (overviewRows.length > 1) {
      // Detect candidate universal journeys: a journey whose student set is
      // nearly identical (Jaccard >= 0.85) to at least one other journey's set.
      const JACCARD_THRESHOLD = 0.85;
      const candidates = new Set();
      for (let i = 0; i < overviewRows.length; i++) {
        for (let j = i + 1; j < overviewRows.length; j++) {
          const a = overviewRows[i].studentIds;
          const b = overviewRows[j].studentIds;
          let inter = 0;
          a.forEach(id => { if (b.has(id)) inter++; });
          const union = a.size + b.size - inter;
          const jacc = union ? inter / union : 0;
          if (jacc >= JACCARD_THRESHOLD) {
            candidates.add(overviewRows[i].journey);
            candidates.add(overviewRows[j].journey);
          }
        }
      }

      // Default universal selection = detected candidates (pre-checked)
      window._universalSelection = new Set(candidates);

      const overviewBlock = document.createElement('div');
      overviewBlock.className = 'overview-block';
      overviewBlock.id = 'overview-block';
      container.insertBefore(overviewBlock, container.firstChild);

      // Confirmation panel (only when candidates exist)
      if (candidates.size > 0) {
        const panel = document.createElement('div');
        panel.className = 'universal-panel';
        const optionsHTML = [...candidates].sort().map(j => {
          const row = overviewRows.find(r => r.journey === j);
          return `
            <label class="universal-option">
              <input type="checkbox" checked onchange="toggleUniversal('${j.replace(/'/g, "\\'")}', this.checked)">
              <span>${j} <span class="opt-meta">(${row.assigned} students)</span></span>
            </label>`;
        }).join('');
        panel.innerHTML = `
          <div class="universal-panel-title">Universal journeys detected</div>
          <div class="universal-panel-desc">
            These journeys share nearly the same students as one another, which usually means
            they're assigned to everyone (e.g. Transfer &amp; Career). They've been split out below
            so the grand total counts each student once instead of multiple times. Uncheck any that
            shouldn't be treated as universal.
          </div>
          <div class="universal-options">${optionsHTML}</div>`;
        container.insertBefore(panel, overviewBlock);
      }

      renderOverview();
    }

    document.getElementById('results').style.display = 'block';
    document.getElementById('action-bar').style.display = 'flex';
  }

  // Called when a universal-journey checkbox is toggled
  function toggleUniversal(journey, checked) {
    if (!window._universalSelection) window._universalSelection = new Set();
    if (checked) window._universalSelection.add(journey);
    else window._universalSelection.delete(journey);
    renderOverview();
  }

  // Builds one overview <tr> for a journey stat object
  function overviewRowHTML(r) {
    return `
      <tr>
        <td><span class="ov-journey">${r.journey}</span></td>
        <td class="num"><span class="ov-count">${r.assigned}</span></td>
        <td class="num">
          <span class="ov-count">${r.anyStepComplete}</span><span class="ov-pct">${pct(r.anyStepComplete, r.assigned)}</span>
        </td>
        <td class="num">
          <span class="ov-count">${r.threePlusSteps}</span><span class="ov-pct">${pct(r.threePlusSteps, r.assigned)}</span>
        </td>
        <td class="num">
          <span class="ov-count complete">${r.journeyComplete}</span><span class="ov-pct">${pct(r.journeyComplete, r.assigned)}</span>
        </td>
        <td class="num"><span class="ov-count student">${r.stepsByStudent}</span></td>
        <td class="num"><span class="ov-count staff">${r.stepsByStaff}</span></td>
      </tr>`;
  }

  // Sums a set of overview rows into a totals object
  function sumRows(rows) {
    return rows.reduce((acc, r) => ({
      assigned: acc.assigned + r.assigned,
      anyStepComplete: acc.anyStepComplete + r.anyStepComplete,
      threePlusSteps: acc.threePlusSteps + r.threePlusSteps,
      journeyComplete: acc.journeyComplete + r.journeyComplete,
      stepsByStudent: acc.stepsByStudent + r.stepsByStudent,
      stepsByStaff: acc.stepsByStaff + r.stepsByStaff
    }), { assigned: 0, anyStepComplete: 0, threePlusSteps: 0, journeyComplete: 0, stepsByStudent: 0, stepsByStaff: 0 });
  }

  // Builds a totals-style <tr> (subtotal / total / grand-total)
  function totalsRowHTML(label, t, rowClass) {
    return `
      <tr class="${rowClass}">
        <td>${label}</td>
        <td class="num"><span class="ov-count">${t.assigned}</span></td>
        <td class="num">
          <span class="ov-count">${t.anyStepComplete}</span><span class="ov-pct">${pct(t.anyStepComplete, t.assigned)}</span>
        </td>
        <td class="num">
          <span class="ov-count">${t.threePlusSteps}</span><span class="ov-pct">${pct(t.threePlusSteps, t.assigned)}</span>
        </td>
        <td class="num">
          <span class="ov-count complete">${t.journeyComplete}</span><span class="ov-pct">${pct(t.journeyComplete, t.assigned)}</span>
        </td>
        <td class="num"><span class="ov-count student">${t.stepsByStudent}</span></td>
        <td class="num"><span class="ov-count staff">${t.stepsByStaff}</span></td>
      </tr>`;
  }

  // Computes a true unique-student grand total from the raw data (dedup by Student ID).
  // Assigned = unique students in the whole file.
  // anyStepComplete = unique students with >=1 completed step in ANY journey.
  // journeyComplete = unique students with >=1 journey marked Complete.
  // Step counts = raw completed-step events across the whole file.
  function computeUniqueGrandTotal(data) {
    const assignedSet = new Set();
    const anyStepSet = new Set();
    const journeyCompleteSet = new Set();
    let stepsByStudent = 0, stepsByStaff = 0;
    // Track completed distinct steps per (student, journey) so we can find
    // students who hit 3+ steps WITHIN a single journey.
    const stepsPerStudentJourney = {};
    data.forEach(r => {
      const id = r['Student ID'];
      if (!id) return;
      assignedSet.add(id);
      const stepStatus = (r['Journey Step Status'] || '').trim().toLowerCase();
      if (stepStatus === 'complete') {
        anyStepSet.add(id);
        const journey = r['Journey Name'];
        const stepName = r['Journey Step Name'];
        if (journey && stepName) {
          const key = id + '||' + journey;
          if (!stepsPerStudentJourney[key]) stepsPerStudentJourney[key] = new Set();
          stepsPerStudentJourney[key].add(stepName);
        }
        const completedBy = (r['Journey Step Status Completed By Name'] || '').trim().toLowerCase();
        const studentName = (r['Student Name'] || '').trim().toLowerCase();
        if (completedBy && studentName && completedBy === studentName) stepsByStudent++;
        else if (completedBy) stepsByStaff++;
      }
      if ((r['Journey Status'] || '').trim().toLowerCase() === 'complete') {
        journeyCompleteSet.add(id);
      }
    });
    // Unique students with 3+ completed steps in at least one journey
    const threePlusSet = new Set();
    Object.entries(stepsPerStudentJourney).forEach(([key, set]) => {
      if (set.size >= 3) threePlusSet.add(key.split('||')[0]);
    });
    return {
      assigned: assignedSet.size,
      anyStepComplete: anyStepSet.size,
      threePlusSteps: threePlusSet.size,
      journeyComplete: journeyCompleteSet.size,
      stepsByStudent: stepsByStudent,
      stepsByStaff: stepsByStaff
    };
  }

  // Renders (or re-renders) the overview table based on the current universal selection
  function renderOverview() {
    const rows = window._overviewRows || [];
    const data = window._overviewData || [];
    const block = document.getElementById('overview-block');
    if (!block) return;

    const universal = window._universalSelection || new Set();
    const majorRows = rows.filter(r => !universal.has(r.journey));
    const universalRows = rows.filter(r => universal.has(r.journey));

    const header = `
      <thead>
        <tr>
          <th>Journey</th>
          <th class="num">Assigned</th>
          <th class="num">Students with at least 1 step complete</th>
          <th class="num">Students with 3+ steps complete</th>
          <th class="num">Students with journey complete</th>
          <th class="num">Steps completed by student</th>
          <th class="num">Steps completed by staff</th>
        </tr>
      </thead>`;

    let bodyHTML = '';
    let note = '';

    if (universalRows.length === 0) {
      // No universal journeys — single flat table with one totals row (original behavior)
      bodyHTML = rows.map(overviewRowHTML).join('')
        + totalsRowHTML('Total', sumRows(rows), 'total-row');
    } else {
      // Grouped layout: Major/Program section + subtotal, Universal section + subtotal,
      // then a deduplicated unique-student grand total.
      if (majorRows.length > 0) {
        bodyHTML += `<tr class="section-row"><td colspan="7">Major / Program Journeys</td></tr>`;
        bodyHTML += majorRows.map(overviewRowHTML).join('');
        bodyHTML += totalsRowHTML('Subtotal — major / program', sumRows(majorRows), 'subtotal-row');
      }
      bodyHTML += `<tr class="section-row"><td colspan="7">Universal Journeys</td></tr>`;
      bodyHTML += universalRows.map(overviewRowHTML).join('');
      bodyHTML += totalsRowHTML('Subtotal — universal', sumRows(universalRows), 'subtotal-row');

      const grand = computeUniqueGrandTotal(data);
      bodyHTML += totalsRowHTML('Grand total — unique students', grand, 'grand-total-row');

      note = `
        <div class="grand-total-note">
          Subtotals above are sums of their rows. The grand total counts each student only once
          across the whole file (deduplicated by Student ID), so students assigned to multiple
          journeys aren't double-counted. For the completion columns, the grand total means unique
          students who did that in <em>any</em> journey; the step columns are raw completed-step counts.
        </div>`;
    }

    block.innerHTML = `
      <div class="overview-title">Overview${universalRows.length ? ' — grouped by journey type' : ' — all journeys'}</div>
      <div class="overview-scroll">
        <table class="overview">
          ${header}
          <tbody>${bodyHTML}</tbody>
        </table>
      </div>${note}`;
  }

  function printReport() {
    window.print();
  }

  function downloadFlat() {
    const stepCols = [
      'Journey Step Name', 'Journey Step Status',
      'Journey Step Status Completed By Name', 'Journey Step Status Completed By ID',
      'Journey Step Status Completed By Email', 'Journey Step Status Completion Date',
      'Journey Step Status Completion Time'
    ];
    if (!parsedData.length) return;
    const allCols = Object.keys(parsedData[0]);
    const keepCols = allCols.filter(c => !stepCols.includes(c));
    const seen = new Set();
    const flat = [];
    parsedData.forEach(row => {
      const key = (row['Student ID'] || '') + '||' + (row['Journey Name'] || '');
      if (!seen.has(key)) {
        seen.add(key);
        const newRow = {};
        keepCols.forEach(c => { newRow[c] = row[c]; });
        flat.push(newRow);
      }
    });
    const csv = Papa.unparse(flat);
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'journeys_report_flat.csv';
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
